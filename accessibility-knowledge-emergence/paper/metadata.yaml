---
title: "Accessibility Knowledge Emergence: Behavioral and Mechanistic Evidence from the Pythia and GPT-2 Model Suites"
author: "Trisha Salas"
date: "February 2026"
affiliation: "Independent Researcher"
abstract: |
  The Web Content Accessibility Guidelines (WCAG) represent a specialized, low-frequency domain in web-scale training data. We investigates how language models acquire accessibility knowledge as a function of scale, using the Pythia model suite (160M–6.9B parameters), the GPT-2 model suite (small to XL) and TransformerLens to examine internal representations and behavioral outputs across model sizes.  Attention pattern analysis reveals that the 2.8B model binds "screen reader" as a compound concept across multiple layers and heads — mechanistic encoding that precedes full behavioral competence and is not reducible to output accuracy. Accessibility concept emergence follows a sharp threshold pattern: screen reader, skip link, and alt text emerge behaviorally at 2.8B parameters, while WCAG first appears at 6.9B and ARIA fails to emerge at any scale tested. Perplexity analysis shows that models prefer correct definitions before they can produce them, with the preference flipping between 410M and 1B in Pythia and between 406M and 838M in GPT-2. Even at 6.9B, models that correctly define accessibility concepts cannot reliably identify violations in code. Across two model families, deep-network compound binding persistence emerges only at the same scale where behavioral competence appears, and never appears where competence fails.
lang: en
